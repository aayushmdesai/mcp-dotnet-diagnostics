name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore McpDotnetDiagnostics.slnx

      - name: Build
        run: dotnet build McpDotnetDiagnostics.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/McpDotnetDiagnostics.Tests/McpDotnetDiagnostics.Tests.csproj --no-build --configuration Release --verbosity normal
        # Integration tests target the xUnit runner's own PID (Environment.ProcessId).
        # No separate .NET process needed. TMPDIR is not required on Linux.

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/McpDotnetDiagnostics -c Release -o ./nupkg

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: aayushmdesai14

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json